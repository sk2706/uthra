<!DOCTYPE html>
<html>
<head>
<title>Uthra 💜✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #d9a7ff, #b388ff, #7b2ff7);
    color: white;
    overflow-x: hidden;
}

.box {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 20px;
    margin: 20px;
    border-radius: 15px;
}

img {
    width: 90%;
    max-width: 300px;
    border-radius: 15px;
}

button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #a855f7;
    color: white;
}

/* floating effect */
.heart {
    position: fixed;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {transform: scale(0.5) translateY(0); opacity:1;}
    100% {transform: scale(1.5) translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<h1>For My Sweetheart Uthra 💜✨</h1>

<div class="box">

<h3>Open this every morning 💜✨</h3>

<img src="https://i.postimg.cc/nckNn3Zz/Whats-App-Image-2026-04-19-at-12-49-04-AM.jpg">

<p>
Good morning my sweetheart 💜✨  
(This message you update daily 💙)
</p>

<button onclick="showSurprise()">Tap for surprise 💜</button>
<p id="surprise" style="display:none;">
You are my peace… my safe place… and my favorite person 💙
</p>

<button onclick="unlock()">🔒 Unlock my heart</button>
<div id="secret" style="display:none;">
<p>Only you have access to this… because you are everything to me 💜✨</p>
</div>

<h2 id="heart" onclick="growHeart()">💜</h2>

<button onclick="checkDate()">🎁 Open Surprise</button>
<p id="giftMsg"></p>

</div>

<div class="box">
<h2>⏳ Counting moments until your special day 💜✨</h2>
<div id="countdown"></div>
</div>

<script>

// 💜 surprise
function showSurprise() {
  document.getElementById("surprise").style.display = "block";
}

// 🔒 unlock
function unlock() {
  document.getElementById("secret").style.display = "block";
}

// 💜 heart grow
let size = 30;
function growHeart() {
  size += 10;
  document.getElementById("heart").style.fontSize = size + "px";
}

// 🎁 birthday check
function checkDate() {
  let today = new Date();
  let date = today.getDate();
  let month = today.getMonth() + 1;

  if(date == 3 && month == 5){
    document.getElementById("giftMsg").innerHTML =
    "Happy Birthday my love 💜✨ This page was made only for you ❤️";
    startConfetti();
  } else {
    document.getElementById("giftMsg").innerHTML =
    "Wait for May 3 😘";
  }
}

// ⏳ countdown
var countDownDate = new Date("May 3, 2026 00:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
  var seconds = Math.floor((distance % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}, 1000);

// 🎆 confetti
function startConfetti() {
  for(let i=0;i<80;i++){
    let conf = document.createElement("div");
    conf.className="heart";
    conf.innerHTML = ["💜","✨","💖","💫"][Math.floor(Math.random()*4)];
    conf.style.left = Math.random()*100 + "%";
    conf.style.top = Math.random()*100 + "%";
    conf.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(conf);
  }
}

// auto effect
window.onload = function() {
  startConfetti();
}

</script>

</body>
</html>
